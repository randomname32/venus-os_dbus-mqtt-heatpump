; CONFIG FILE
; GitHub repository: https://github.com/randomname32/venus-os_dbus-mqtt-heatpump
; Remove semicolon ; to enable a setting

[DEFAULT]
; Set logging level
; ERROR = shows errors only
; WARNING = shows ERROR and warnings
; INFO = shows WARNING and running functions
; DEBUG = shows INFO and data/values
; default: WARNING
logging = WARNING

; Device name shown in VenusOS / VRM
; default: MQTT Heat Pump
device_name = MQTT Heat Pump

; Device VRM instance
; Use a unique number if you run multiple instances of this driver
; default: 100
device_instance = 100

; Specify after how many seconds the driver should exit if no new MQTT message was received
; default: 60
; set to 0 to disable the timeout
timeout = 60

; Voltage used to calculate current when no current value is provided in the MQTT payload
; default: 230
voltage = 230

; Maximum allowed power in watts — payloads exceeding this value are rejected as implausible
; default: 14490  (230 V * 63 A)
power_threshold = 14490


[MQTT]
; IP address or FQDN of the MQTT broker
; "localhost" is allowed — use it when the VenusOS built-in MQTT broker is your source
broker_address = IP_ADDR_OR_FQDN

; Port of the MQTT broker
; default plaintext: 1883
; default TLS port: 8883
broker_port = 1883

; Enables TLS
; 0 = Disabled
; 1 = Enabled
;tls_enabled = 1

; Absolute path to the Certificate Authority certificate file treated as trusted by this client
;tls_path_to_ca = /data/keys/mosquitto.crt

; Disables verification of the server hostname in the server certificate
; 0 = Disabled
; 1 = Enabled
;tls_insecure = 1

; Username used for connection
;username = myuser

; Password used for connection
;password = mypassword

; Topic on which the heat pump data is published as a JSON string
;
; Minimum required payload:
;   {"heatpump": {"power": 0.0}}
;
; Full payload example:
;   {
;     "heatpump": {
;       "power": 800.0,
;       "current": 3.5,
;       "voltage": 230.0,
;       "energy_forward": 1250.50,
;       "temperature": 45.5,
;       "target_temperature": 50.0,
;       "state": 3
;     }
;   }
;
; All fields except "power" are optional.
; "state" values: 0=Off, 1=Error, 2=Startup, 3=Heating, 4=Cooling
topic = home/heatpump/status
